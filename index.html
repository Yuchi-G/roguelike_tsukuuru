<!doctype html>
<!--
  ブラウザでゲームを表示するためのHTML。
  Canvasはゲーム描画、asideはステータスとログ表示に使う。
-->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roguelike Tsukuuru</title>
  </head>
  <body>
    <div id="app">
      <main class="game-shell">
        <div class="map-panel">
          <canvas id="game-canvas" width="960" height="640" aria-label="roguelike game canvas"></canvas>
          <div id="start-screen" class="start-screen" aria-live="polite">
            <div>
              <strong>Roguelike Tsukuuru</strong>
              <span>右の設定を調整してからゲームスタート</span>
            </div>
          </div>
          <div id="map-overlay" class="map-overlay" aria-live="polite"></div>
        </div>
        <aside class="side-panel">
          <section class="panel-block">
            <h1>Roguelike Tsukuuru</h1>
            <div id="status" class="status"></div>
          </section>
          <section class="panel-block">
            <h2>ログ</h2>
            <ol id="log" class="log"></ol>
          </section>
          <section class="panel-block">
            <h2>設定</h2>
            <div id="config-panel" class="config-panel"></div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
